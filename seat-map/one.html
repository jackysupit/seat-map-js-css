<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Seat Map Rotated</title>
  <link rel="stylesheet" href="one.css">
</head>
<body>
  <div class="seat-container">
    <div class="the-screen">
        <span class="screen-title">SCREEN</span>
    </div>

    <!-- Layout with rows and columns -->
    <div class="v-flex">
      <div class="seat-block sticky-top column middle" id="middleBlockColumnTop"></div>     
      <div class="seat-layout-wrapper">
        <!-- Left Row Labels -->
        <div class="row-labels sticky-left" id="rowLabelsLeft"></div>

        <!-- Seat Blocks -->
        <div class="seat-map">
          <div class="seat-block left" id="leftBlock"></div>
          <div class="seat-block middle" id="middleBlock"></div>
          <div class="seat-block right" id="rightBlock"></div>
        </div>
    
        <!-- Right Row Labels -->
        <div class="row-labels sticky-right right" id="rowLabelsRight"></div>
      </div>
      <div class="seat-block sticky-bottom column middle" id="middleBlockColumnBottom"></div>
    </div>    
  </div>

  <!-- Your custom script -->
  <script src="one.js" type="text/javascript"></script>  
</body>
</html>
